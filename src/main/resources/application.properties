spring.application.name=retail
# ===================================================================
# JWT SECURITY CONFIGURATION
# In production, this value is injected by the physical server (e.g. AWS)
# ===================================================================
monate.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
monate.security.jwt.expiration-time-ms=86400000
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Increase the maximum allowed size for a single file
spring.servlet.multipart.max-file-size=10MB
# Increase the maximum allowed size for the entire multipart request
spring.servlet.multipart.max-request-size=10MB
# ============================================================================
# DATABASE POOLING & THREAD SAFETY SETTINGS
# ============================================================================
# The maximum number of active database connections (threads).
# Set this based on your database server's capacity. 20-50 is standard for local/small dev.
spring.datasource.hikari.maximum-pool-size=30
# How long a thread waits for a database connection before timing out (in ms).
# Prevents threads from hanging forever if the database is locked.
spring.datasource.hikari.connection-timeout=30000
# How long an idle connection can stay in the pool before being closed.
spring.datasource.hikari.idle-timeout=600000
# ============================================================================
# HIBERNATE & CONCURRENCY SETTINGS
# ============================================================================
# Ensures that the database performs updates in a way that respects versioning.
# This works with the @Version annotation we added earlier.
spring.jpa.properties.hibernate.optimistic_lock=true
# Batching: Instead of sending 1000 INSERT statements one-by-one,
# Hibernate groups them into 50-sized batches.
# This is crucial for your CSV upload thread-safety and performance.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Prevents the "N+1" problem by telling Hibernate how to fetch data effectively.
spring.jpa.properties.hibernate.default_batch_fetch_size=20